<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a365d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReBalance">
    <meta name="description" content="คำนวณและปรับสัดส่วนพอร์ตการลงทุน">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <title>ReBalance Stock</title>
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --primary: #1a365d;
            --accent: #3182ce;
            --green: #276749;
            --green-bg: #f0fff4;
            --red: #c53030;
            --red-bg: #fff5f5;
            --muted: #718096;
            --border: #e2e8f0;
            --radius: 14px;
            --header-h: 56px;
            --summary-h: 72px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
            font-size: 15px;
            color: #2d3748;
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: calc(8px + var(--safe-t)) 14px 8px;
            background: var(--primary);
            color: #fff;
        }
        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }
        .header-text { flex: 1; min-width: 0; }
        .header-text h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }
        .header-text p {
            margin: 0;
            font-size: 11px;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-install {
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }
        .btn-install.visible { display: block; }

        /* ── Summary bar ── */
        .summary {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .summary-item {
            flex: 1;
            min-width: 0;
            background: #ebf8ff;
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
        }
        .summary-item.warn { background: #fff5f5; }
        .summary-item.ok { background: var(--green-bg); }
        .summary-label {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .summary-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .summary-item.warn .summary-value { color: var(--red); }
        .summary-item.ok .summary-value { color: var(--green); }

        /* ── Scrollable list ── */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 10px 14px calc(80px + var(--safe-b));
        }

        /* ── Rebalance summary ── */
        .rebalance-summary {
            flex-shrink: 0;
            padding: 0 14px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .rebalance-summary.hidden { display: none; }
        .rebalance-box {
            background: #f7fafc;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            line-height: 1.5;
        }
        .rebalance-box .buy-line { color: var(--green); font-weight: 600; }
        .rebalance-box .sell-line { color: var(--red); font-weight: 600; }
        .rebalance-box .hold-line { color: var(--muted); }

        /* ── Asset row — single line ── */
        .asset-row {
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr) 72px 52px minmax(72px, auto) 28px;
            align-items: end;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            padding: 8px 10px;
        }
        .asset-badge {
            width: 38px;
            height: 38px;
            border-radius: 9px;
            background: var(--primary);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.5px;
        }
        .asset-info { min-width: 0; }
        .asset-name {
            font-weight: 700;
            font-size: 13px;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .asset-meta {
            font-size: 10px;
            color: var(--muted);
            white-space: nowrap;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .input-field label {
            font-size: 9px;
            color: var(--muted);
            text-align: center;
            line-height: 1;
            white-space: nowrap;
        }
        .asset-input {
            width: 100%;
            padding: 7px 4px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 13px;
            text-align: center;
            -webkit-appearance: none;
            appearance: none;
            min-width: 0;
        }
        .asset-input.pct { padding-right: 2px; }
        .asset-action {
            text-align: right;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
        }
        .buy { color: var(--green); }
        .sell { color: var(--red); }
        .hold { color: var(--muted); font-weight: 600; }
        .btn-delete {
            background: none;
            border: none;
            color: var(--red);
            font-size: 16px;
            line-height: 1;
            padding: 4px;
            cursor: pointer;
            opacity: 0.5;
        }
        .btn-delete:active { opacity: 1; }

        /* ── FAB ── */
        .fab-wrap {
            position: fixed;
            bottom: calc(16px + var(--safe-b));
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 0 14px;
            pointer-events: none;
        }
        .fab {
            pointer-events: auto;
            width: 100%;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(39,103,73,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── Modal ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.open { display: flex; }
        .sheet {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 20px 16px calc(20px + var(--safe-b));
        }
        .sheet h3 {
            margin: 0 0 14px;
            font-size: 16px;
            color: var(--primary);
        }
        .sheet input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .sheet-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .sheet-actions button {
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel {
            background: var(--bg);
            color: var(--muted);
        }
        .btn-confirm {
            background: var(--green);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <img class="header-icon" src="/icons/icon-192.png" alt="ReBalance" width="36" height="36">
        <div class="header-text">
            <h1>ReBalance Stock</h1>
            <p>บันทึกอัตโนมัติในเครื่อง</p>
        </div>
        <button class="btn-install" id="btn-install" type="button">ติดตั้ง</button>
    </header>

    <div class="summary">
        <div class="summary-item">
            <div class="summary-label">มูลค่ารวม</div>
            <div class="summary-value">$<span id="total-value">0</span></div>
        </div>
        <div class="summary-item" id="target-box">
            <div class="summary-label">เป้าหมายรวม</div>
            <div class="summary-value" id="target-status">0%</div>
        </div>
    </div>

    <div class="rebalance-summary hidden" id="rebalance-summary">
        <div class="rebalance-box" id="rebalance-text"></div>
    </div>

    <div class="list-wrap" id="assets-list"></div>
</div>

<div class="fab-wrap">
    <button class="fab" type="button" onclick="openAddSheet()">
        <span>＋</span> เพิ่มสินทรัพย์
    </button>
</div>

<div class="overlay" id="add-overlay" onclick="closeAddSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
        <h3>เพิ่มสินทรัพย์ใหม่</h3>
        <input type="text" id="new-asset-name" placeholder="ชื่อ เช่น VOO, ACWI" autocomplete="off" inputmode="text">
        <div class="sheet-actions">
            <button class="btn-cancel" type="button" onclick="closeAddSheet()">ยกเลิก</button>
            <button class="btn-confirm" type="button" onclick="addAsset()">เพิ่ม</button>
        </div>
    </div>
</div>

<script>
const defaultAssets = [
    { name: 'QQQI', value: 3000, target: 33 },
    { name: 'JEPQ', value: 1120, target: 12 },
    { name: 'SMH',  value: 3500, target: 38 },
    { name: 'IBIT', value: 1500, target: 17 }
];

let myPortfolio = JSON.parse(localStorage.getItem('myPortfolio')) || defaultAssets;

function fmt(n, dec = 2) {
    return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function getAction(diff) {
    if (diff > 0.01) return { cls: 'buy', text: `ซื้อ<br>$${fmt(diff, 0)}` };
    if (diff < -0.01) return { cls: 'sell', text: `ขาย<br>$${fmt(Math.abs(diff), 0)}` };
    return { cls: 'hold', text: 'สมดุล' };
}

function renderAndCalculate() {
    const list = document.getElementById('assets-list');
    list.innerHTML = '';

    let totalValue = 0;
    let totalTarget = 0;
    myPortfolio.forEach(a => {
        totalValue += a.value;
        totalTarget += a.target;
    });

    document.getElementById('total-value').textContent = fmt(totalValue, 0);

    const targetBox = document.getElementById('target-box');
    const targetEl = document.getElementById('target-status');
    targetBox.className = 'summary-item' + (totalTarget === 100 ? ' ok' : ' warn');
    targetEl.textContent = totalTarget + '%' + (totalTarget !== 100 ? ' ⚠' : ' ✓');

    if (myPortfolio.length === 0) {
        document.getElementById('rebalance-summary').classList.add('hidden');
        list.innerHTML = '<div class="empty-state">ยังไม่มีสินทรัพย์<br>กดปุ่มด้านล่างเพื่อเพิ่ม</div>';
        localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
        return;
    }

    const buys = [], sells = [];
    let totalBuy = 0, totalSell = 0;

    myPortfolio.forEach((asset, index) => {
        const curPct = totalValue > 0 ? (asset.value / totalValue) * 100 : 0;
        const ideal = totalValue * (asset.target / 100);
        const diff = ideal - asset.value;
        const action = getAction(diff);

        if (diff > 0.01) { buys.push(`${asset.name} $${fmt(diff, 0)}`); totalBuy += diff; }
        else if (diff < -0.01) { sells.push(`${asset.name} $${fmt(Math.abs(diff), 0)}`); totalSell += Math.abs(diff); }

        const row = document.createElement('div');
        row.className = 'asset-row';
        row.innerHTML = `
            <div class="asset-badge">${asset.name.slice(0, 4)}</div>
            <div class="asset-info">
                <div class="asset-name">${asset.name}</div>
                <div class="asset-meta">${curPct.toFixed(1)}% · เป้า $${fmt(ideal, 0)}</div>
            </div>
            <div class="input-field">
                <label for="val-${index}">มูลค่า $</label>
                <input class="asset-input" id="val-${index}" type="number" inputmode="decimal" value="${asset.value || ''}" placeholder="0"
                    oninput="updateAsset(${index}, 'value', this.value)">
            </div>
            <div class="input-field">
                <label for="tgt-${index}">เป้า %</label>
                <input class="asset-input pct" id="tgt-${index}" type="number" inputmode="decimal" value="${asset.target || ''}" placeholder="0"
                    oninput="updateAsset(${index}, 'target', this.value)">
            </div>
            <div class="asset-action ${action.cls}">${action.text}</div>
            <button class="btn-delete" type="button" aria-label="ลบ ${asset.name}" onclick="deleteAsset(${index})">×</button>`;
        list.appendChild(row);
    });

    const summaryEl = document.getElementById('rebalance-summary');
    const textEl = document.getElementById('rebalance-text');
    if (buys.length || sells.length) {
        let html = '';
        if (buys.length) html += `<div class="buy-line">🟢 ซื้อเพิ่ม: ${buys.join(', ')} (รวม $${fmt(totalBuy, 0)})</div>`;
        if (sells.length) html += `<div class="sell-line">🔴 ขายออก: ${sells.join(', ')} (รวม $${fmt(totalSell, 0)})</div>`;
        textEl.innerHTML = html;
        summaryEl.classList.remove('hidden');
    } else {
        textEl.innerHTML = '<div class="hold-line">✓ พอร์ตสมดุลแล้ว — ไม่ต้องซื้อขาย</div>';
        summaryEl.classList.remove('hidden');
    }

    localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
}

function updateAsset(index, field, val) {
    myPortfolio[index][field] = parseFloat(val) || 0;
    renderAndCalculate();
}

function deleteAsset(index) {
    if (confirm(`ลบ ${myPortfolio[index].name} ออกจากพอร์ต?`)) {
        myPortfolio.splice(index, 1);
        renderAndCalculate();
    }
}

function openAddSheet() {
    document.getElementById('add-overlay').classList.add('open');
    document.getElementById('new-asset-name').value = '';
    setTimeout(() => document.getElementById('new-asset-name').focus(), 100);
}

function closeAddSheet(e) {
    if (e && e.target !== document.getElementById('add-overlay')) return;
    document.getElementById('add-overlay').classList.remove('open');
}

function addAsset() {
    const name = document.getElementById('new-asset-name').value.trim().toUpperCase();
    if (!name) return;
    myPortfolio.push({ name, value: 0, target: 0 });
    closeAddSheet();
    renderAndCalculate();
}

document.getElementById('new-asset-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAsset();
});

/* PWA */
let deferredPrompt;
const btnInstall = document.getElementById('btn-install');

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstall.classList.add('visible');
});

btnInstall.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btnInstall.classList.remove('visible');
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

renderAndCalculate();
</script>
</body>
</html>

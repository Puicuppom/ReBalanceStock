<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a365d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReBalance">
    <meta name="description" content="คำนวณและปรับสัดส่วนพอร์ตการลงทุน">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <title>ReBalance Stock</title>
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --primary: #1a365d;
            --accent: #3182ce;
            --green: #276749;
            --green-bg: #f0fff4;
            --red: #c53030;
            --red-bg: #fff5f5;
            --muted: #718096;
            --border: #e2e8f0;
            --radius: 14px;
            --header-h: 56px;
            --summary-h: 72px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
            font-size: 15px;
            color: #2d3748;
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: calc(8px + var(--safe-t)) 14px 8px;
            background: var(--primary);
            color: #fff;
        }
        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }
        .header-text { flex: 1; min-width: 0; }
        .header-text h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }
        .header-text p {
            margin: 0;
            font-size: 11px;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-install {
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }
        .btn-install.visible { display: block; }

        /* ── Summary bar ── */
        .summary {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .summary-item {
            flex: 1;
            min-width: 0;
            background: #ebf8ff;
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
        }
        .summary-item.warn { background: #fff5f5; }
        .summary-item.ok { background: var(--green-bg); }
        .summary-label {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .summary-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .summary-item.warn .summary-value { color: var(--red); }
        .summary-item.ok .summary-value { color: var(--green); }

        /* ── Scrollable list ── */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 10px 14px calc(80px + var(--safe-b));
        }

        /* ── Asset row (compact) ── */
        .asset-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            overflow: hidden;
        }
        .asset-top {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            cursor: pointer;
            user-select: none;
        }
        .asset-badge {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.5px;
        }
        .asset-info { flex: 1; min-width: 0; }
        .asset-name {
            font-weight: 700;
            font-size: 14px;
            line-height: 1.2;
        }
        .asset-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }
        .asset-action {
            flex-shrink: 0;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            max-width: 110px;
            line-height: 1.3;
        }
        .buy { color: var(--green); }
        .sell { color: var(--red); }
        .hold { color: var(--muted); }

        .chevron {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
            opacity: 0.4;
        }
        .asset-row.open .chevron { transform: rotate(180deg); }

        /* ── Expanded edit panel ── */
        .asset-edit {
            display: none;
            padding: 0 12px 12px;
            border-top: 1px dashed var(--border);
        }
        .asset-row.open .asset-edit { display: block; }

        .edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .edit-grid label {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .edit-grid input {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            -webkit-appearance: none;
            appearance: none;
        }
        .edit-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }
        .btn-delete {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid #fed7d7;
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 11px;
            cursor: pointer;
        }

        /* ── FAB ── */
        .fab-wrap {
            position: fixed;
            bottom: calc(16px + var(--safe-b));
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 0 14px;
            pointer-events: none;
        }
        .fab {
            pointer-events: auto;
            width: 100%;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(39,103,73,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── Modal ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.open { display: flex; }
        .sheet {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 20px 16px calc(20px + var(--safe-b));
        }
        .sheet h3 {
            margin: 0 0 14px;
            font-size: 16px;
            color: var(--primary);
        }
        .sheet input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .sheet-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .sheet-actions button {
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel {
            background: var(--bg);
            color: var(--muted);
        }
        .btn-confirm {
            background: var(--green);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <img class="header-icon" src="/icons/icon-192.png" alt="ReBalance" width="36" height="36">
        <div class="header-text">
            <h1>ReBalance Stock</h1>
            <p>บันทึกอัตโนมัติในเครื่อง</p>
        </div>
        <button class="btn-install" id="btn-install" type="button">ติดตั้ง</button>
    </header>

    <div class="summary">
        <div class="summary-item">
            <div class="summary-label">มูลค่ารวม</div>
            <div class="summary-value">$<span id="total-value">0</span></div>
        </div>
        <div class="summary-item" id="target-box">
            <div class="summary-label">เป้าหมายรวม</div>
            <div class="summary-value" id="target-status">0%</div>
        </div>
    </div>

    <div class="list-wrap" id="assets-list"></div>
</div>

<div class="fab-wrap">
    <button class="fab" type="button" onclick="openAddSheet()">
        <span>＋</span> เพิ่มสินทรัพย์
    </button>
</div>

<div class="overlay" id="add-overlay" onclick="closeAddSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
        <h3>เพิ่มสินทรัพย์ใหม่</h3>
        <input type="text" id="new-asset-name" placeholder="ชื่อ เช่น VOO, ACWI" autocomplete="off" inputmode="text">
        <div class="sheet-actions">
            <button class="btn-cancel" type="button" onclick="closeAddSheet()">ยกเลิก</button>
            <button class="btn-confirm" type="button" onclick="addAsset()">เพิ่ม</button>
        </div>
    </div>
</div>

<script>
const defaultAssets = [
    { name: 'QQQI', value: 3000, target: 33 },
    { name: 'JEPQ', value: 1120, target: 12 },
    { name: 'SMH',  value: 3500, target: 38 },
    { name: 'IBIT', value: 1500, target: 17 }
];

let myPortfolio = JSON.parse(localStorage.getItem('myPortfolio')) || defaultAssets;
let openIndex = -1;

function fmt(n, dec = 2) {
    return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function renderAndCalculate() {
    const list = document.getElementById('assets-list');
    list.innerHTML = '';

    let totalValue = 0;
    let totalTarget = 0;
    myPortfolio.forEach(a => {
        totalValue += a.value;
        totalTarget += a.target;
    });

    document.getElementById('total-value').textContent = fmt(totalValue, 0);

    const targetBox = document.getElementById('target-box');
    const targetEl = document.getElementById('target-status');
    targetBox.className = 'summary-item' + (totalTarget === 100 ? ' ok' : ' warn');
    targetEl.textContent = totalTarget + '%' + (totalTarget !== 100 ? ' ⚠' : ' ✓');

    if (myPortfolio.length === 0) {
        list.innerHTML = '<div class="empty-state">ยังไม่มีสินทรัพย์<br>กดปุ่มด้านล่างเพื่อเพิ่ม</div>';
        localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
        return;
    }

    myPortfolio.forEach((asset, index) => {
        const curPct = totalValue > 0 ? (asset.value / totalValue) * 100 : 0;
        const ideal = totalValue * (asset.target / 100);
        const diff = ideal - asset.value;

        let actionClass = 'hold', actionShort = 'Hold';
        if (diff > 0.01) {
            actionClass = 'buy';
            actionShort = `+$${fmt(diff, 0)}`;
        } else if (diff < -0.01) {
            actionClass = 'sell';
            actionShort = `-$${fmt(Math.abs(diff), 0)}`;
        }

        const row = document.createElement('div');
        row.className = 'asset-row' + (openIndex === index ? ' open' : '');
        row.innerHTML = `
            <div class="asset-top" onclick="toggleRow(${index})">
                <div class="asset-badge">${asset.name.slice(0, 4)}</div>
                <div class="asset-info">
                    <div class="asset-name">${asset.name}</div>
                    <div class="asset-meta">${curPct.toFixed(1)}% → เป้า ${asset.target}%</div>
                </div>
                <div class="asset-action ${actionClass}">${actionShort}</div>
                <svg class="chevron" viewBox="0 0 16 16" fill="currentColor"><path d="M4 6l4 4 4-4"/></svg>
            </div>
            <div class="asset-edit">
                <div class="edit-grid">
                    <div>
                        <label>มูลค่า (USD)</label>
                        <input type="number" inputmode="decimal" value="${asset.value || ''}" placeholder="0"
                            oninput="updateAsset(${index}, 'value', this.value)">
                    </div>
                    <div>
                        <label>เป้าหมาย (%)</label>
                        <input type="number" inputmode="decimal" value="${asset.target || ''}" placeholder="0"
                            oninput="updateAsset(${index}, 'target', this.value)">
                    </div>
                </div>
                <div class="edit-footer">
                    <span>เป้า $${fmt(ideal, 0)}</span>
                    <button class="btn-delete" type="button" onclick="deleteAsset(${index})">ลบ</button>
                </div>
            </div>`;
        list.appendChild(row);
    });

    localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
}

function toggleRow(index) {
    openIndex = openIndex === index ? -1 : index;
    renderAndCalculate();
}

function updateAsset(index, field, val) {
    myPortfolio[index][field] = parseFloat(val) || 0;
    renderAndCalculate();
}

function deleteAsset(index) {
    if (confirm(`ลบ ${myPortfolio[index].name} ออกจากพอร์ต?`)) {
        myPortfolio.splice(index, 1);
        openIndex = -1;
        renderAndCalculate();
    }
}

function openAddSheet() {
    document.getElementById('add-overlay').classList.add('open');
    document.getElementById('new-asset-name').value = '';
    setTimeout(() => document.getElementById('new-asset-name').focus(), 100);
}

function closeAddSheet(e) {
    if (e && e.target !== document.getElementById('add-overlay')) return;
    document.getElementById('add-overlay').classList.remove('open');
}

function addAsset() {
    const name = document.getElementById('new-asset-name').value.trim().toUpperCase();
    if (!name) return;
    myPortfolio.push({ name, value: 0, target: 0 });
    openIndex = myPortfolio.length - 1;
    closeAddSheet();
    renderAndCalculate();
}

document.getElementById('new-asset-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAsset();
});

/* PWA */
let deferredPrompt;
const btnInstall = document.getElementById('btn-install');

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstall.classList.add('visible');
});

btnInstall.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btnInstall.classList.remove('visible');
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

renderAndCalculate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReBalance">
    <meta name="description" content="คำนวณและปรับสัดส่วนพอร์ตการลงทุน">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <title>ReBalance Stock</title>
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --primary: #1a365d;
            --accent: #3182ce;
            --green: #276749;
            --green-bg: #f0fff4;
            --red: #c53030;
            --red-bg: #fff5f5;
            --muted: #718096;
            --border: #e2e8f0;
            --radius: 14px;
            --header-h: 56px;
            --summary-h: 72px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
            font-size: 15px;
            color: #2d3748;
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: calc(8px + var(--safe-t)) 14px 8px;
            background: var(--primary);
            color: #fff;
        }
        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }
        .header-text { flex: 1; min-width: 0; }
        .header-text h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }
        .header-text p {
            margin: 0;
            font-size: 11px;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-install {
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }
        .btn-install.visible { display: block; }
        .btn-refresh {
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-refresh:disabled { opacity: 0.5; cursor: wait; }
        .price-meta {
            font-size: 10px;
            color: var(--muted);
        }
        .price-meta.err { color: var(--red); }
        .cell-value.price-live { color: var(--accent); font-size: 15px; }

        /* ── Summary bar ── */
        .summary {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .summary-item {
            flex: 1;
            min-width: 0;
            background: #ebf8ff;
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
        }
        .summary-item.warn { background: #fff5f5; }
        .summary-item.ok { background: var(--green-bg); }
        .summary-label {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .summary-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .summary-sub {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
        }
        .summary-item.warn .summary-value { color: var(--red); }
        .summary-item.ok .summary-value { color: var(--green); }

        /* ── Scrollable list ── */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 10px 14px calc(80px + var(--safe-b));
        }

        /* ── Rebalance summary ── */
        .rebalance-summary {
            flex-shrink: 0;
            padding: 0 14px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .rebalance-summary.hidden { display: none; }
        .hidden { display: none !important; }

        /* ── Mode toggle ── */
        .mode-bar {
            flex-shrink: 0;
            display: flex;
            gap: 6px;
            padding: 8px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .mode-btn {
            flex: 1;
            padding: 8px 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #f7fafc;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            line-height: 1.25;
        }
        .mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .squad-note {
            flex-shrink: 0;
            padding: 0 14px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
            line-height: 1.4;
        }
        .rebalance-box {
            background: #f7fafc;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            line-height: 1.5;
        }
        .rebalance-box .buy-line { color: var(--green); font-weight: 600; }
        .rebalance-box .sell-line { color: var(--red); font-weight: 600; }
        .rebalance-box .hold-line { color: var(--muted); }
        .rebalance-box .profit-line { color: #b7791f; font-weight: 600; }
        .rebalance-box .buy-alert-line { color: #2b6cb0; font-weight: 600; }
        .rebalance-box .dip-line { color: var(--accent); font-weight: 600; }

        /* ── Buy settings ── */
        .buy-settings {
            flex-shrink: 0;
            padding: 0 14px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .buy-settings .setting-title { color: #2b6cb0; }
        .buy-item {
            background: #ebf8ff;
            border-radius: 10px;
            padding: 8px 10px;
        }

        /* ── Take-profit settings — 3 tiers ── */
        .profit-settings {
            flex-shrink: 0;
            padding: 0 14px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .setting-title {
            font-size: 11px;
            font-weight: 700;
            color: #b7791f;
            margin-bottom: 2px;
        }
        .setting-hint {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .tier-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .tier-item {
            background: #fffbeb;
            border-radius: 10px;
            padding: 6px 8px;
            min-width: 0;
        }
        .tier-num {
            font-size: 10px;
            font-weight: 700;
            color: #b7791f;
            margin-bottom: 4px;
            text-align: center;
        }
        .tier-row {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 3px;
        }
        .tier-row:last-child { margin-bottom: 0; }
        .tier-row label {
            font-size: 9px;
            color: var(--muted);
            flex-shrink: 0;
            width: 22px;
        }
        .setting-input {
            width: 100%;
            padding: 4px 2px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            -webkit-appearance: none;
            appearance: none;
            min-width: 0;
        }
        .setting-suffix {
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }
        .tier-status {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }
        .tier-btn {
            flex: 1;
            padding: 6px 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #f7fafc;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            text-align: center;
        }
        .tier-btn.done {
            background: var(--green-bg);
            border-color: #9ae6b4;
            color: var(--green);
        }
        .tier-btn.active {
            background: #fffbeb;
            border-color: #f6e05e;
            color: #b7791f;
        }
        .tier-btn.active.trailing {
            background: #fff5f5;
            border-color: #feb2b2;
            color: var(--red);
        }
        .peak-hint {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            margin-top: 4px;
        }

        /* ── Strategy groups ── */
        .group-header {
            padding: 12px 4px 6px;
        }
        .group-header:first-child { padding-top: 4px; }
        .group-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
        }
        .group-meta {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
            line-height: 1.35;
        }
        .asset-role {
            font-size: 10px;
            font-weight: 500;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Asset card — 2 lines ── */
        .asset-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            padding: 10px 12px;
            transition: box-shadow 0.15s;
        }
        .asset-card.drag-float {
            position: fixed;
            z-index: 200;
            margin: 0;
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            opacity: 0.96;
            pointer-events: none;
        }
        .drag-placeholder {
            background: #ebf8ff;
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            margin-bottom: 8px;
        }
        .list-wrap.drag-active { touch-action: none; }
        .drag-handle {
            flex-shrink: 0;
            color: var(--muted);
            font-size: 20px;
            line-height: 1;
            padding: 4px 2px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            opacity: 0.4;
        }
        .drag-handle:active { opacity: 0.8; }
        .asset-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border);
        }
        .asset-badge {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            border-radius: 9px;
            background: var(--primary);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.5px;
        }
        .asset-name {
            flex: 1;
            min-width: 0;
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .asset-action {
            flex-shrink: 0;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
        }
        .buy { color: var(--green); }
        .sell { color: var(--red); }
        .hold { color: var(--muted); font-weight: 600; }
        .btn-delete {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--red);
            font-size: 18px;
            line-height: 1;
            padding: 2px 4px;
            cursor: pointer;
            opacity: 0.45;
        }
        .btn-delete:active { opacity: 1; }

        .asset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .cell {
            background: #f7fafc;
            border-radius: 8px;
            padding: 8px 10px;
            min-width: 0;
        }
        .cell-label {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .cell-value {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
        }
        .cell-value.loss { color: var(--red); }
        .cell-value.gain { color: var(--green); }
        .profit-badge {
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 700;
            color: #b7791f;
            background: #fffbeb;
            border: 1px solid #f6e05e;
            border-radius: 6px;
            padding: 2px 6px;
            white-space: nowrap;
        }
        .buy-badge {
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 700;
            color: #2b6cb0;
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 6px;
            padding: 2px 6px;
            white-space: nowrap;
        }
        .cell-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 16px;
            font-weight: 600;
            background: var(--surface);
            -webkit-appearance: none;
            appearance: none;
            min-width: 0;
        }

        /* ── FAB ── */
        .fab-wrap {
            position: fixed;
            bottom: calc(16px + var(--safe-b));
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 0 14px;
            pointer-events: none;
        }
        .fab {
            pointer-events: auto;
            width: 100%;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(39,103,73,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── Modal ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.open { display: flex; }
        .sheet {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 20px 16px calc(20px + var(--safe-b));
        }
        .sheet h3 {
            margin: 0 0 14px;
            font-size: 16px;
            color: var(--primary);
        }
        .sheet input, .sheet select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .sheet-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .sheet-actions button {
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel {
            background: var(--bg);
            color: var(--muted);
        }
        .btn-confirm {
            background: var(--green);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <img class="header-icon" src="/icons/icon-192.png" alt="ReBalance" width="36" height="36">
        <div class="header-text">
            <h1>ReBalance Stock</h1>
            <p>กดค้าง ≡ เพื่อสลับลำดับ</p>
        </div>
        <button class="btn-refresh" id="btn-refresh" type="button" title="อัปเดตราคา">↻</button>
        <button class="btn-install" id="btn-install" type="button">ติดตั้ง</button>
    </header>

    <div class="summary">
        <div class="summary-item">
            <div class="summary-label">มูลค่ารวม</div>
            <div class="summary-value">$<span id="total-value">0</span></div>
        </div>
        <div class="summary-item" id="target-box">
            <div class="summary-label">เป้าหมายรวม (ETF+หุ้น)</div>
            <div class="summary-value" id="target-status">0%</div>
            <div class="summary-sub" id="target-breakdown"></div>
        </div>
    </div>

    <div class="mode-bar">
        <button class="mode-btn active" id="mode-income" type="button" onclick="setTab('income')">ปันผล</button>
        <button class="mode-btn" id="mode-growth" type="button" onclick="setTab('growth')">Growth</button>
        <button class="mode-btn" id="mode-alpha" type="button" onclick="setTab('alpha')">Alpha</button>
    </div>

    <div class="squad-note" id="squad-note"></div>

    <div class="profit-settings hidden" id="profit-settings">
        <div class="setting-title">ขายทำกำไร 3 ส่วน</div>
        <div class="setting-hint">ส่วน 1–2 ขายตามเป้ากำไร · ส่วน 3 Trailing stop ขายส่วนที่เหลือ</div>
        <div class="tier-grid" id="tier-settings"></div>
    </div>

    <div class="buy-settings">
        <div class="setting-title">แจ้งซื้อ</div>
        <div class="setting-hint">ปรับสัดส่วนอัตโนมัติ · ซื้อเมื่อร่วงจากจุดสูงสุด</div>
        <div class="buy-item">
            <div class="tier-row">
                <label style="width:auto">ร่วง</label>
                <input class="setting-input" id="dip-buy-pct" type="number" inputmode="decimal" value="10"
                    oninput="updateDipBuy(this.value)">
                <span class="setting-suffix">% จากสูงสุด → แจ้งซื้อ</span>
            </div>
        </div>
    </div>

    <div class="rebalance-summary hidden" id="rebalance-summary">
        <div class="rebalance-box" id="rebalance-text"></div>
    </div>

    <div class="list-wrap" id="assets-list"></div>
</div>

<div class="fab-wrap">
    <button class="fab" type="button" onclick="openAddSheet()">
        <span>＋</span> เพิ่มสินทรัพย์
    </button>
</div>

<div class="overlay" id="add-overlay" onclick="closeAddSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
        <h3>เพิ่มสินทรัพย์ใหม่</h3>
        <input type="text" id="new-asset-name" placeholder="ชื่อย่อ เช่น QQQI, MSFT" autocomplete="off" inputmode="text">
        <div class="sheet-actions">
            <button class="btn-cancel" type="button" onclick="closeAddSheet()">ยกเลิก</button>
            <button class="btn-confirm" type="button" onclick="addAsset()">เพิ่ม</button>
        </div>
    </div>
</div>

<script>
const GROUP_ORDER = ['income', 'growth', 'alpha'];

const GROUPS = {
    income: {
        label: '1. ทัพหลวงปั๊มปันผล',
        hint: 'Income · ปันผล Reinvest ซ่อมพอร์ต',
        kind: 'etf'
    },
    growth: {
        label: '2. ทัพเติบโตบลูชิพ',
        hint: 'Tech Growth · เสาหลักหุ้นรายตัว',
        kind: 'stock'
    },
    alpha: {
        label: '3. ทัพเสริมสร้าง Alpha',
        hint: 'Growth / Tactical · จับจังหวะตามแนวรับ',
        kind: 'stock'
    }
};

const STRATEGY = {
    QQQI: { target: 38, group: 'income', kind: 'etf', role: 'แกนปันผลรายเดือน · Reinvest' },
    RDTE: { target: 7,  group: 'income', kind: 'etf', role: 'ปันผลรายสัปดาห์ · Yield สูง' },
    MSFT: { target: 20, group: 'growth', kind: 'stock', role: 'เสาหลัก Tech · ปรับฐานน้อย' },
    AVGO: { target: 15, group: 'growth', kind: 'stock', role: 'หุ้นเติบโตระยะยาว' },
    META: { target: 12, group: 'alpha',  kind: 'stock', role: 'FCF แข็ง · ซื้อตามส่วนลด' },
    PLTR: { target: 8,  group: 'alpha',  kind: 'stock', role: 'ซิ่งพื้นฐานดี · จับจังหวะ' }
};

const defaultAssets = [
    { name: 'QQQI', kind: 'etf',   group: 'income', shares: 0, avgCost: 0, target: 38 },
    { name: 'RDTE', kind: 'etf',   group: 'income', shares: 0, avgCost: 0, target: 7 },
    { name: 'MSFT', kind: 'stock', group: 'growth', shares: 0, avgCost: 0, target: 20 },
    { name: 'AVGO', kind: 'stock', group: 'growth', shares: 0, avgCost: 0, target: 15 },
    { name: 'META', kind: 'stock', group: 'alpha',  shares: 0, avgCost: 0, target: 12 },
    { name: 'PLTR', kind: 'stock', group: 'alpha',  shares: 0, avgCost: 0, target: 8 }
];

const ETF_SYMBOLS = new Set(['QQQI', 'RDTE', 'JEPQ', 'SMH', 'IBIT', 'VOO', 'SPY', 'QQQ', 'VTI', 'ACWI']);

function inferKind(name) {
    return ETF_SYMBOLS.has(String(name).toUpperCase()) ? 'etf' : 'stock';
}

function inferGroup(name, kind) {
    const s = STRATEGY[name];
    if (s) return s.group;
    return kind === 'etf' ? 'income' : 'alpha';
}

function getAssetRole(name) {
    return STRATEGY[name]?.role || '';
}

function mergeDefaultPortfolio(list) {
    const names = new Set(list.map(a => a.name));
    defaultAssets.forEach(d => {
        if (!names.has(d.name)) {
            list.push({ ...d, peakValue: 0, tiersDone: [false, false, false] });
        }
    });
    return list;
}

function applyStrategyMigration(list) {
    if (localStorage.getItem('strategyTargets') === '2') return list;
    list.forEach(a => {
        const s = STRATEGY[a.name];
        if (s) {
            a.target = s.target;
            a.group = s.group;
            a.kind = s.kind;
        } else if (!a.group) {
            a.group = inferGroup(a.name, a.kind || inferKind(a.name));
        }
    });
    localStorage.setItem('strategyTargets', '2');
    return list;
}

function sortPortfolioByGroup() {
    myPortfolio.sort((a, b) => {
        const ga = GROUP_ORDER.indexOf(a.group || inferGroup(a.name, a.kind));
        const gb = GROUP_ORDER.indexOf(b.group || inferGroup(b.name, b.kind));
        return ga - gb || a.name.localeCompare(b.name);
    });
}

let priceCache = {};
let priceFetching = false;

let myPortfolio = JSON.parse(localStorage.getItem('myPortfolio')) || defaultAssets;
myPortfolio = mergeDefaultPortfolio(myPortfolio);
myPortfolio = applyStrategyMigration(myPortfolio);
myPortfolio = myPortfolio.map(a => {
    const kind = a.kind || inferKind(a.name);
    const item = {
        name: a.name,
        kind,
        group: a.group || inferGroup(a.name, kind),
        shares: a.shares ?? 0,
        avgCost: a.avgCost ?? 0,
        target: a.target ?? 0,
        peakValue: a.peakValue || 0,
        tiersDone: a.tiersDone || [false, false, false]
    };
    if ((!item.shares || item.shares === 0) && a.value > 0) item._legacyValue = a.value;
    if ((!item.avgCost || item.avgCost === 0) && a.cost > 0 && item.shares > 0) {
        item.avgCost = a.cost / item.shares;
    }
    return item;
});
sortPortfolioByGroup();

function getPrice(symbol) {
    return priceCache[symbol]?.price || 0;
}

function syncAssetValues() {
    myPortfolio.forEach(a => {
        const price = getPrice(a.name);
        if (a._legacyValue && price > 0) {
            a.shares = a._legacyValue / price;
            delete a._legacyValue;
        }
        a.price = price;
        a.value = (a.shares || 0) * price;
        a.cost = (a.shares || 0) * (a.avgCost || 0);
    });
}

async function fetchPrices(fullRender = false) {
    if (priceFetching) return;
    const symbols = myPortfolio.map(a => a.name).filter(Boolean);
    if (!symbols.length) return;

    priceFetching = true;
    const btn = document.getElementById('btn-refresh');
    if (btn) btn.disabled = true;

    await Promise.all(symbols.map(async (symbol) => {
        try {
            const res = await fetch(`/api/quote?symbol=${encodeURIComponent(symbol)}`);
            const data = await res.json();
            if (res.ok && data.price) {
                priceCache[symbol] = { price: data.price, at: Date.now() };
            } else {
                priceCache[symbol] = { price: priceCache[symbol]?.price || 0, error: true };
            }
        } catch {
            priceCache[symbol] = { price: priceCache[symbol]?.price || 0, error: true };
        }
    }));

    syncAssetValues();
    priceFetching = false;
    if (btn) btn.disabled = false;

    if (fullRender || !document.querySelector('.asset-card')) {
        renderAndCalculate();
    } else {
        recalculate();
    }
}

document.getElementById('btn-refresh').addEventListener('click', () => fetchPrices());

const TAB_LABELS = { income: 'ปันผล', growth: 'Growth', alpha: 'Alpha' };

function loadActiveTab() {
    const saved = localStorage.getItem('activeTab');
    if (GROUP_ORDER.includes(saved)) return saved;
    return localStorage.getItem('etfMode') === 'false' ? 'growth' : 'income';
}

let activeTab = loadActiveTab();

function showProfitTaking() {
    return activeTab !== 'income';
}

function setTab(tab) {
    if (!GROUP_ORDER.includes(tab)) return;
    activeTab = tab;
    localStorage.setItem('activeTab', activeTab);
    updateTabUI();
    renderAndCalculate();
}

function updateTabUI() {
    GROUP_ORDER.forEach(g => {
        const btn = document.getElementById('mode-' + g);
        if (btn) {
            btn.textContent = `${TAB_LABELS[g]} ${getTargetByGroup(g)}%`;
            btn.classList.toggle('active', g === activeTab);
        }
    });
    const g = GROUPS[activeTab];
    const squadPct = getTargetByGroup(activeTab);
    document.getElementById('squad-note').textContent =
        `${g.hint} · เป้าทัพนี้ ${squadPct}% · รวมทั้งพอร์ตต้องครบ 100%`;
    document.getElementById('profit-settings').classList.toggle('hidden', !showProfitTaking());
}

updateTabUI();

const defaultTiers = [
    { type: 'profit', profitPct: 15, sellPct: 30 },
    { type: 'profit', profitPct: 25, sellPct: 30 },
    { type: 'trailing', trailingPct: 10 }
];
let profitTiers = JSON.parse(localStorage.getItem('profitTiers')) || defaultTiers;
if (!profitTiers[2] || profitTiers[2].type !== 'trailing') {
    profitTiers = defaultTiers;
    localStorage.setItem('profitTiers', JSON.stringify(profitTiers));
}

function renderTierSettings() {
    const el = document.getElementById('tier-settings');
    el.innerHTML = profitTiers.map((tier, i) => {
        if (tier.type === 'trailing') {
            return `<div class="tier-item">
                <div class="tier-num">ส่วน 3 · Trailing</div>
                <div class="tier-row">
                    <label>ร่วง</label>
                    <input class="setting-input" type="number" inputmode="decimal" value="${tier.trailingPct || 10}"
                        oninput="updateTier(${i}, 'trailingPct', this.value)">
                    <span class="setting-suffix">%</span>
                </div>
                <div class="peak-hint">จากจุดสูงสุด → ขายที่เหลือ</div>
            </div>`;
        }
        return `<div class="tier-item">
            <div class="tier-num">ส่วน ${i + 1}</div>
            <div class="tier-row">
                <label>กำไร</label>
                <input class="setting-input" type="number" inputmode="decimal" value="${tier.profitPct}"
                    oninput="updateTier(${i}, 'profitPct', this.value)">
                <span class="setting-suffix">%</span>
            </div>
            <div class="tier-row">
                <label>ขาย</label>
                <input class="setting-input" type="number" inputmode="decimal" value="${tier.sellPct}"
                    oninput="updateTier(${i}, 'sellPct', this.value)">
                <span class="setting-suffix">%</span>
            </div>
        </div>`;
    }).join('');
}

function persistPortfolio() {
    const data = myPortfolio.map(a => ({
        name: a.name,
        kind: a.kind || inferKind(a.name),
        group: a.group || inferGroup(a.name, a.kind),
        shares: a.shares || 0,
        avgCost: a.avgCost || 0,
        target: a.target || 0,
        peakValue: a.peakValue || 0,
        tiersDone: a.tiersDone || [false, false, false]
    }));
    localStorage.setItem('myPortfolio', JSON.stringify(data));
}

function getTargetByKind(kind) {
    return myPortfolio.filter(a => a.kind === kind).reduce((s, a) => s + (a.target || 0), 0);
}

function getTargetByGroup(group) {
    return myPortfolio.filter(a => (a.group || inferGroup(a.name, a.kind)) === group)
        .reduce((s, a) => s + (a.target || 0), 0);
}

function getAssetGroup(asset) {
    return asset.group || inferGroup(asset.name, asset.kind);
}

function isVisibleAsset(asset) {
    return getAssetGroup(asset) === activeTab;
}

function updatePeakValues() {
    syncAssetValues();
    myPortfolio.forEach(a => {
        if (a.value > (a.peakValue || 0)) a.peakValue = a.value;
    });
}

function getRemainingPct(asset) {
    const done = asset.tiersDone || [false, false, false];
    let sold = 0;
    for (let i = 0; i < 2; i++) {
        if (done[i]) sold += profitTiers[i].sellPct || 0;
    }
    return Math.max(0, 100 - sold);
}

function getTierStatus(asset, profitPct) {
    const done = asset.tiersDone || [false, false, false];
    const peak = asset.peakValue || asset.value || 0;
    const dropFromPeak = peak > 0 ? ((peak - asset.value) / peak) * 100 : 0;
    let activeTier = null;

    for (let i = 0; i < 2; i++) {
        if (!done[i] && profitPct >= (profitTiers[i].profitPct || 0)) {
            activeTier = {
                index: i,
                type: 'profit',
                sellPct: profitTiers[i].sellPct,
                sellAmount: asset.value * ((profitTiers[i].sellPct || 0) / 100)
            };
            break;
        }
    }

    if (!activeTier && !done[2] && done[0] && done[1]) {
        const trailingPct = profitTiers[2].trailingPct || 10;
        const remaining = getRemainingPct(asset);
        if (dropFromPeak >= trailingPct && profitPct > 0 && remaining > 0) {
            activeTier = {
                index: 2,
                type: 'trailing',
                dropFromPeak,
                peak,
                remaining,
                sellAmount: asset.value * (remaining / 100)
            };
        }
    }

    return { done, activeTier, peak, dropFromPeak, remaining: getRemainingPct(asset) };
}

function updateTier(index, field, val) {
    profitTiers[index][field] = parseFloat(val) || 0;
    localStorage.setItem('profitTiers', JSON.stringify(profitTiers));
    recalculate();
}

function toggleTierDone(assetIndex, tierIndex) {
    if (!myPortfolio[assetIndex].tiersDone) myPortfolio[assetIndex].tiersDone = [false, false, false];
    myPortfolio[assetIndex].tiersDone[tierIndex] = !myPortfolio[assetIndex].tiersDone[tierIndex];
    recalculate();
}

renderTierSettings();

let dipBuyPct = parseFloat(localStorage.getItem('dipBuyPct')) || 10;
document.getElementById('dip-buy-pct').value = dipBuyPct;

function updateDipBuy(val) {
    dipBuyPct = parseFloat(val) || 0;
    localStorage.setItem('dipBuyPct', dipBuyPct);
    recalculate();
}

function getBuyAlerts(asset, diff, curPct) {
    const peak = asset.peakValue || asset.value || 0;
    const dropFromPeak = peak > 0 ? ((peak - asset.value) / peak) * 100 : 0;
    const alerts = [];

    if (diff > 0.01) {
        alerts.push({
            type: 'rebalance',
            amount: diff,
            gap: asset.target - curPct,
            text: `ปรับสัดส่วน $${fmt(diff, 0)} (ต่ำเป้า ${(asset.target - curPct).toFixed(1)}%)`
        });
    }

    if (dropFromPeak >= dipBuyPct && peak > asset.value) {
        const dipAmount = diff > 0.01 ? diff : asset.value * 0.1;
        alerts.push({
            type: 'dip',
            amount: dipAmount,
            dropFromPeak,
            peak,
            text: `ร่วง ${dropFromPeak.toFixed(0)}% จาก $${fmt(peak, 0)} → ซื้อ $${fmt(dipAmount, 0)}`
        });
    }

    return alerts;
}

function fmt(n, dec = 2) {
    return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function getAction(diff) {
    if (diff > 0.01) return { cls: 'buy', text: `ซื้อ<br>$${fmt(diff, 0)}` };
    if (diff < -0.01) return { cls: 'sell', text: `ขาย<br>$${fmt(Math.abs(diff), 0)}` };
    return { cls: 'hold', text: 'สมดุล' };
}

function computePortfolio() {
    updatePeakValues();
    let totalValue = 0, totalTarget = 0;
    myPortfolio.forEach(a => {
        totalValue += a.value;
        totalTarget += a.target;
    });

    const assets = myPortfolio.map((asset, index) => {
        const curPct = totalValue > 0 ? (asset.value / totalValue) * 100 : 0;
        const ideal = totalValue * (asset.target / 100);
        const diff = ideal - asset.value;
        const cost = asset.cost || 0;
        const profit = cost > 0 ? asset.value - cost : 0;
        const profitPct = cost > 0 ? (profit / cost) * 100 : 0;
        const tierStatus = getTierStatus(asset, profitPct);
        const buyAlerts = getBuyAlerts(asset, diff, curPct);
        return { index, asset, curPct, ideal, diff, action: getAction(diff), cost, profit, profitPct, tierStatus, buyAlerts };
    });

    return { totalValue, totalTarget, assets };
}

function formatProfit(profit, profitPct) {
    const sign = profit >= 0 ? '+' : '';
    const cls = profit >= 0 ? 'gain' : 'loss';
    return { text: `${sign}${profitPct.toFixed(1)}% ($${fmt(Math.abs(profit), 0)})`, cls };
}

function updateSummary(totalValue, totalTarget, assets) {
    document.getElementById('total-value').textContent = fmt(totalValue, 0);

    const targetBox = document.getElementById('target-box');
    const targetEl = document.getElementById('target-status');
    const breakdownEl = document.getElementById('target-breakdown');
    const incomeTarget = getTargetByGroup('income');
    const growthTarget = getTargetByGroup('growth');
    const alphaTarget = getTargetByGroup('alpha');
    targetBox.className = 'summary-item' + (totalTarget === 100 ? ' ok' : ' warn');
    targetEl.textContent = totalTarget + '%' + (totalTarget !== 100 ? ' ⚠' : ' ✓');
    breakdownEl.textContent = `Income ${incomeTarget}% · Growth ${growthTarget}% · Alpha ${alphaTarget}%`;
    updateTabUI();

    const summaryEl = document.getElementById('rebalance-summary');
    const textEl = document.getElementById('rebalance-text');
    const rebalanceBuys = [], dipBuys = [], sells = [], takeProfits = [];
    let totalBuy = 0, totalSell = 0;

    assets.forEach(({ asset, diff, profitPct, tierStatus, cost, buyAlerts }) => {
        if (diff < -0.01) { sells.push(`${asset.name} $${fmt(Math.abs(diff), 0)}`); totalSell += Math.abs(diff); }

        buyAlerts.forEach(alert => {
            if (alert.type === 'rebalance') {
                rebalanceBuys.push(`${asset.name} $${fmt(alert.amount, 0)}`);
                totalBuy += alert.amount;
            } else if (alert.type === 'dip') {
                dipBuys.push(`${asset.name} −${alert.dropFromPeak.toFixed(0)}% → $${fmt(alert.amount, 0)}`);
            }
        });

        if (showProfitTaking() && getAssetGroup(asset) !== 'income' && cost > 0 && tierStatus.activeTier) {
            const t = tierStatus.activeTier;
            if (t.type === 'trailing') {
                takeProfits.push(`${asset.name} Trailing −${t.dropFromPeak.toFixed(0)}% จาก $${fmt(t.peak, 0)} → ขาย $${fmt(t.sellAmount, 0)} (${t.remaining}% ที่เหลือ)`);
            } else {
                takeProfits.push(`${asset.name} ส่วน${t.index + 1} +${profitPct.toFixed(0)}% → ขาย $${fmt(t.sellAmount, 0)} (${t.sellPct}%)`);
            }
        }
    });

    let html = '';
    if (takeProfits.length) {
        html += `<div class="profit-line">💰 ขายทำกำไร: ${takeProfits.join(' · ')}</div>`;
    }
    if (rebalanceBuys.length) {
        html += `<div class="buy-alert-line">🔵 ซื้อปรับสัดส่วน: ${rebalanceBuys.join(', ')} (รวม $${fmt(totalBuy, 0)})</div>`;
    }
    if (dipBuys.length) {
        html += `<div class="dip-line">🔵 ซื้อจังหวะดี: ${dipBuys.join(' · ')}</div>`;
    }
    if (sells.length) html += `<div class="sell-line">🔴 ขายปรับสัดส่วน: ${sells.join(', ')} (รวม $${fmt(totalSell, 0)})</div>`;

    if (html) {
        textEl.innerHTML = html;
        summaryEl.classList.remove('hidden');
    } else if (assets.length) {
        textEl.innerHTML = '<div class="hold-line">✓ พอร์ตสมดุลแล้ว — ไม่ต้องซื้อขาย</div>';
        summaryEl.classList.remove('hidden');
    } else {
        summaryEl.classList.add('hidden');
    }
}

function renderTierButtons(index, tierStatus, cost) {
    if (!cost || !showProfitTaking()) return '';
    const { done, activeTier } = tierStatus;
    const btns = profitTiers.map((tier, i) => {
        let cls = 'tier-btn';
        if (done[i]) cls += ' done';
        else if (activeTier && activeTier.index === i) {
            cls += ' active';
            if (activeTier.type === 'trailing') cls += ' trailing';
        }
        const label = i === 2 ? (done[i] ? 'T✓' : 'T') : (done[i] ? `${i + 1}✓` : `${i + 1}`);
        return `<button class="${cls}" type="button" onclick="toggleTierDone(${index}, ${i})">${label}</button>`;
    }).join('');
    let hint = '';
    if (done[0] && done[1] && !done[2] && tierStatus.peak > 0) {
        hint = `<div class="peak-hint">สูงสุด $${fmt(tierStatus.peak, 0)} · ร่วง ${tierStatus.dropFromPeak.toFixed(1)}%</div>`;
    }
    return `<div class="tier-status">${btns}</div>${hint}`;
}

function updateBuyBadge(card, buyAlerts, tierStatus, cost) {
    const sellBadge = card.querySelector('.profit-badge');
    const buyBadge = card.querySelector('.buy-badge');

    if (sellBadge) {
        if (showProfitTaking() && cost > 0 && tierStatus.activeTier) {
            const t = tierStatus.activeTier;
            sellBadge.textContent = t.type === 'trailing' ? '📉 Trailing' : `📈 ขาย ${t.index + 1}/3`;
            sellBadge.style.display = '';
        } else {
            sellBadge.style.display = 'none';
        }
    }

    if (buyBadge) {
        const rebalance = buyAlerts.find(a => a.type === 'rebalance');
        const dip = buyAlerts.find(a => a.type === 'dip');
        if (rebalance) {
            buyBadge.textContent = `🔵 ซื้อ $${fmt(rebalance.amount, 0)}`;
            buyBadge.style.display = '';
        } else if (dip) {
            buyBadge.textContent = `🔵 Dip −${dip.dropFromPeak.toFixed(0)}%`;
            buyBadge.style.display = '';
        } else {
            buyBadge.style.display = 'none';
        }
    }
}

function updateTierUI(card, index, tierStatus, cost, profit, profitPct, buyAlerts) {
    if (showProfitTaking()) {
        const profitEl = card.querySelector('.asset-profit');
        if (profitEl) {
            if (cost > 0) {
                const p = formatProfit(profit, profitPct);
                profitEl.className = 'cell-value asset-profit ' + p.cls;
                profitEl.textContent = p.text;
            } else {
                profitEl.className = 'cell-value asset-profit';
                profitEl.textContent = '—';
            }
        }
    }

    updateBuyBadge(card, buyAlerts, tierStatus, cost);

    const tierEl = card.querySelector('.tier-status-wrap');
    if (tierEl && showProfitTaking()) tierEl.innerHTML = renderTierButtons(index, tierStatus, cost);
}

function recalculate() {
    const { totalValue, totalTarget, assets } = computePortfolio();
    updateSummary(totalValue, totalTarget, assets);
    updateTabUI();

    assets.forEach(({ index, curPct, ideal, action, cost, profit, profitPct, tierStatus, buyAlerts, asset }) => {
        const card = document.querySelector(`.asset-card[data-index="${index}"]`);
        if (!card) return;
        const price = getPrice(asset.name);
        const priceEl = card.querySelector('.asset-price');
        if (priceEl) {
            if (price > 0) {
                priceEl.className = 'cell-value asset-price price-live';
                priceEl.textContent = '$' + fmt(price, 2);
            } else {
                priceEl.className = 'cell-value asset-price price-meta err';
                priceEl.textContent = priceCache[asset.name]?.error ? 'ไม่พบราคา' : '…';
            }
        }
        const valEl = card.querySelector('.asset-value');
        if (valEl) valEl.textContent = '$' + fmt(asset.value, 0);
        card.querySelector('.asset-pct').textContent = curPct.toFixed(1) + '%';
        card.querySelector('.asset-ideal').textContent = '$' + fmt(ideal, 0);
        const actionEl = card.querySelector('.asset-action');
        actionEl.className = 'asset-action ' + action.cls;
        actionEl.innerHTML = action.text;
        updateTierUI(card, index, tierStatus, cost, profit, profitPct, buyAlerts);
    });

    persistPortfolio();
}

            <div class="asset-grid">

                    <span class="cell-label">ราคาปัจจุบัน</span>

                </div>

                    <span class="cell-label">ต้นทุนเฉลี่ย/หุ้น</span>

                        oninput="updateAsset(${index}, 'avgCost', this.value)">
                </div>
                <div class="cell">
                    <span class="cell-label">มูลค่า</span>
                    <span class="cell-value asset-value">$${fmt(asset.value, 0)}</span>
                </div>
                <div class="cell">
                    <span class="cell-label">สัดส่วนจริง</span>
                    <span class="cell-value asset-pct">${curPct.toFixed(1)}%</span>
                </div>
                <div class="cell">
                    <span class="cell-label">เป้าหมาย %</span>
                    <input class="cell-input" type="number" inputmode="decimal"

                        oninput="updateAsset(${index}, 'target', this.value)">
                </div>
                <div class="cell">
                    <span class="cell-label">มูลค่าเป้าหมาย</span>

                </div>
                ${showProfitTaking() ? `
                <div class="cell">
                    <span class="cell-label">กำไร/ขาดทุน</span>

                </div>` : ''}
            </div>
            <div class="tier-status-wrap">${showProfitTaking() ? renderTierButtons(index, tierStatus, cost) : ''}</div>`;

function appendAssetCard(list, payload) {
    const { index, asset, curPct, ideal, action, cost, profit, profitPct, tierStatus, buyAlerts } = payload;
    const profitFmt = cost > 0 ? formatProfit(profit, profitPct) : { text: '—', cls: '' };
    const showSellBadge = showProfitTaking() && cost > 0 && tierStatus.activeTier;
    const sellBadgeText = showSellBadge
        ? (tierStatus.activeTier.type === 'trailing' ? '📉 Trailing' : `📈 ขาย ${tierStatus.activeTier.index + 1}/3`)
        : '';
    const rebalanceBuy = buyAlerts.find(a => a.type === 'rebalance');
    const dipBuy = buyAlerts.find(a => a.type === 'dip');
    const buyBadgeText = rebalanceBuy
        ? `🔵 ซื้อ $${fmt(rebalanceBuy.amount, 0)}`
        : (dipBuy ? `🔵 Dip −${dipBuy.dropFromPeak.toFixed(0)}%` : '');
    const role = getAssetRole(asset.name);
    const row = document.createElement('div');
    row.className = 'asset-card';
    row.dataset.index = index;
    row.innerHTML = `
        <div class="asset-header">
            <span class="drag-handle" aria-label="สลับลำดับ ${asset.name}">≡</span>
            <div class="asset-badge">${asset.name.slice(0, 4)}</div>
            <div class="asset-name-wrap" style="flex:1;min-width:0">
                <div class="asset-name">${asset.name}</div>
                ${role ? `<div class="asset-role">${role}</div>` : ''}
            </div>
            <span class="buy-badge" style="display:${buyBadgeText ? '' : 'none'}">${buyBadgeText}</span>
            <span class="profit-badge" style="display:${showSellBadge ? '' : 'none'}">${sellBadgeText}</span>
            <div class="asset-action ${action.cls}">${action.text}</div>
            <button class="btn-delete" type="button" aria-label="ลบ ${asset.name}" onclick="deleteAsset(${index})">×</button>
        </div>
        ${renderAssetGrid(index, asset, curPct, ideal, profitFmt, cost, profit, profitPct, tierStatus, buyAlerts)}`;
    list.appendChild(row);
}

function renderAndCalculate() {
    const list = document.getElementById('assets-list');
    list.innerHTML = '';

    syncAssetValues();
    const { totalValue, totalTarget, assets } = computePortfolio();
    updateSummary(totalValue, totalTarget, assets);

    const visible = assets.filter(({ asset }) => isVisibleAsset(asset));

    if (visible.length === 0) {
        const g = GROUPS[activeTab];
        list.innerHTML = `<div class="empty-state">ยังไม่มีสินทรัพย์ใน${g.label}<br>กดปุ่มด้านล่างเพื่อเพิ่ม</div>`;
        persistPortfolio();
        return;
    }

    visible.forEach(item => appendAssetCard(list, item));

    persistPortfolio();
}

function updateAsset(index, field, val) {
    myPortfolio[index][field] = parseFloat(val) || 0;
    syncAssetValues();
    recalculate();
}

function deleteAsset(index) {
    if (confirm(`ลบ ${myPortfolio[index].name} ออกจากพอร์ต?`)) {
        myPortfolio.splice(index, 1);
        renderAndCalculate();
    }
}

function openAddSheet() {
    document.getElementById('add-overlay').classList.add('open');
    document.getElementById('new-asset-name').value = '';
    setTimeout(() => document.getElementById('new-asset-name').focus(), 100);
}

function closeAddSheet(e) {
    if (e && e.target !== document.getElementById('add-overlay')) return;
    document.getElementById('add-overlay').classList.remove('open');
}

function addAsset() {
    const name = document.getElementById('new-asset-name').value.trim().toUpperCase();
    if (!name) return;
    const group = activeTab;
    const kind = GROUPS[group]?.kind || inferKind(name);
    myPortfolio.push({
        name, kind, group,
        shares: 0, avgCost: 0, target: 0,
        peakValue: 0, tiersDone: [false, false, false]
    });
    sortPortfolioByGroup();
    closeAddSheet();
    renderAndCalculate();
    fetchPrices();
}

document.getElementById('new-asset-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAsset();
});

/* Drag to reorder (long-press on ≡ handle) */
let drag = null;

function getPoint(e) {
    return e.touches ? e.touches[0] : e;
}

function activateDrag(point) {
    if (!drag || drag.active) return;
    const { card, list } = drag;
    const rect = card.getBoundingClientRect();

    drag.active = true;
    drag.placeholder = document.createElement('div');
    drag.placeholder.className = 'drag-placeholder';
    drag.placeholder.style.height = rect.height + 'px';
    list.insertBefore(drag.placeholder, card);

    card.classList.add('drag-float');
    card.style.width = rect.width + 'px';
    card.style.left = rect.left + 'px';
    card.style.top = (point.clientY - drag.offsetY) + 'px';

    list.classList.add('drag-active');
    if (navigator.vibrate) navigator.vibrate(20);
}

function movePlaceholder(clientY) {
    const cards = [...drag.list.querySelectorAll('.asset-card')];
    for (const card of cards) {
        if (card === drag.card) continue;
        const rect = card.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
            drag.list.insertBefore(drag.placeholder, card);
            return;
        }
    }
    drag.list.appendChild(drag.placeholder);
}

function finishDrag() {
    if (!drag.active) return;
    const { card, list, placeholder } = drag;
    list.insertBefore(card, placeholder);
    placeholder.remove();

    card.classList.remove('drag-float');
    card.removeAttribute('style');
    list.classList.remove('drag-active');

    const cards = [...list.querySelectorAll('.asset-card')];
    const reordered = cards.map(c => myPortfolio[parseInt(c.dataset.index)]);
    const rebuilt = [];
    GROUP_ORDER.forEach(g => {
        if (g === activeTab) rebuilt.push(...reordered);
        else rebuilt.push(...myPortfolio.filter(a => getAssetGroup(a) === g));
    });
    myPortfolio = rebuilt;
    renderAndCalculate();
}

function onDragStart(e) {
    if (drag) return;
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;

    const card = handle.closest('.asset-card');
    if (!card) return;

    const point = getPoint(e);
    drag = {
        card,
        list: card.parentElement,
        startX: point.clientX,
        startY: point.clientY,
        offsetY: point.clientY - card.getBoundingClientRect().top,
        timer: setTimeout(() => activateDrag(point), 400),
        active: false
    };
}

function onDragMove(e) {
    if (!drag) return;
    const point = getPoint(e);

    if (!drag.active) {
        if (Math.abs(point.clientY - drag.startY) > 8 || Math.abs(point.clientX - drag.startX) > 8) {
            clearTimeout(drag.timer);
            drag = null;
        }
        return;
    }

    e.preventDefault();
    drag.card.style.top = (point.clientY - drag.offsetY) + 'px';
    movePlaceholder(point.clientY);
}

function onDragEnd() {
    if (!drag) return;
    clearTimeout(drag.timer);
    if (drag.active) finishDrag();
    drag = null;
}

(function initDragSort() {
    const list = document.getElementById('assets-list');
    list.addEventListener('touchstart', onDragStart, { passive: true });
    list.addEventListener('mousedown', onDragStart);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('touchend', onDragEnd);
    document.addEventListener('touchcancel', onDragEnd);
    document.addEventListener('mouseup', onDragEnd);
    list.addEventListener('contextmenu', e => {
        if (e.target.closest('.drag-handle')) e.preventDefault();
    });
})();

/* PWA */
let deferredPrompt;
const btnInstall = document.getElementById('btn-install');

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstall.classList.add('visible');
});

btnInstall.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btnInstall.classList.remove('visible');
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

renderAndCalculate();
fetchPrices(true);
</script>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReBalance">
    <meta name="description" content="คำนวณและปรับสัดส่วนพอร์ตการลงทุน">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <title>ReBalance Stock</title>
    <style>
        :root {
            --bg: #eef2f7;
            --surface: #ffffff;
            --primary: #1a365d;
            --accent: #3182ce;
            --green: #276749;
            --green-bg: #f0fff4;
            --red: #c53030;
            --red-bg: #fff5f5;
            --muted: #718096;
            --border: #e2e8f0;
            --radius: 14px;
            --header-h: 56px;
            --summary-h: 72px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
            font-size: 15px;
            color: #2d3748;
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: calc(8px + var(--safe-t)) 14px 8px;
            background: var(--primary);
            color: #fff;
        }
        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }
        .header-text { flex: 1; min-width: 0; }
        .header-text h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }
        .header-text p {
            margin: 0;
            font-size: 11px;
            opacity: 0.75;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-install {
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }
        .btn-install.visible { display: block; }

        /* ── Summary bar ── */
        .summary {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .summary-item {
            flex: 1;
            min-width: 0;
            background: #ebf8ff;
            border-radius: 10px;
            padding: 8px 10px;
            text-align: center;
        }
        .summary-item.warn { background: #fff5f5; }
        .summary-item.ok { background: var(--green-bg); }
        .summary-label {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .summary-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .summary-item.warn .summary-value { color: var(--red); }
        .summary-item.ok .summary-value { color: var(--green); }

        /* ── Scrollable list ── */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 10px 14px calc(80px + var(--safe-b));
        }

        /* ── Rebalance summary ── */
        .rebalance-summary {
            flex-shrink: 0;
            padding: 0 14px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .rebalance-summary.hidden { display: none; }
        .rebalance-box {
            background: #f7fafc;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            line-height: 1.5;
        }
        .rebalance-box .buy-line { color: var(--green); font-weight: 600; }
        .rebalance-box .sell-line { color: var(--red); font-weight: 600; }
        .rebalance-box .hold-line { color: var(--muted); }

        /* ── Asset card — 2 lines ── */
        .asset-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            padding: 10px 12px;
            transition: box-shadow 0.15s;
        }
        .asset-card.drag-float {
            position: fixed;
            z-index: 200;
            margin: 0;
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            opacity: 0.96;
            pointer-events: none;
        }
        .drag-placeholder {
            background: #ebf8ff;
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            margin-bottom: 8px;
        }
        .list-wrap.drag-active { touch-action: none; }
        .drag-handle {
            flex-shrink: 0;
            color: var(--muted);
            font-size: 20px;
            line-height: 1;
            padding: 4px 2px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            opacity: 0.4;
        }
        .drag-handle:active { opacity: 0.8; }
        .asset-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border);
        }
        .asset-badge {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            border-radius: 9px;
            background: var(--primary);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.5px;
        }
        .asset-name {
            flex: 1;
            min-width: 0;
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .asset-action {
            flex-shrink: 0;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
        }
        .buy { color: var(--green); }
        .sell { color: var(--red); }
        .hold { color: var(--muted); font-weight: 600; }
        .btn-delete {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--red);
            font-size: 18px;
            line-height: 1;
            padding: 2px 4px;
            cursor: pointer;
            opacity: 0.45;
        }
        .btn-delete:active { opacity: 1; }

        .asset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .cell {
            background: #f7fafc;
            border-radius: 8px;
            padding: 8px 10px;
            min-width: 0;
        }
        .cell-label {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .cell-value {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
        }
        .cell-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 16px;
            font-weight: 600;
            background: var(--surface);
            -webkit-appearance: none;
            appearance: none;
            min-width: 0;
        }

        /* ── FAB ── */
        .fab-wrap {
            position: fixed;
            bottom: calc(16px + var(--safe-b));
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 0 14px;
            pointer-events: none;
        }
        .fab {
            pointer-events: auto;
            width: 100%;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(39,103,73,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── Modal ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .overlay.open { display: flex; }
        .sheet {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 20px 16px calc(20px + var(--safe-b));
        }
        .sheet h3 {
            margin: 0 0 14px;
            font-size: 16px;
            color: var(--primary);
        }
        .sheet input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .sheet-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .sheet-actions button {
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-cancel {
            background: var(--bg);
            color: var(--muted);
        }
        .btn-confirm {
            background: var(--green);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <img class="header-icon" src="/icons/icon-192.png" alt="ReBalance" width="36" height="36">
        <div class="header-text">
            <h1>ReBalance Stock</h1>
            <p>กดค้าง ≡ เพื่อสลับลำดับ</p>
        </div>
        <button class="btn-install" id="btn-install" type="button">ติดตั้ง</button>
    </header>

    <div class="summary">
        <div class="summary-item">
            <div class="summary-label">มูลค่ารวม</div>
            <div class="summary-value">$<span id="total-value">0</span></div>
        </div>
        <div class="summary-item" id="target-box">
            <div class="summary-label">เป้าหมายรวม</div>
            <div class="summary-value" id="target-status">0%</div>
        </div>
    </div>

    <div class="rebalance-summary hidden" id="rebalance-summary">
        <div class="rebalance-box" id="rebalance-text"></div>
    </div>

    <div class="list-wrap" id="assets-list"></div>
</div>

<div class="fab-wrap">
    <button class="fab" type="button" onclick="openAddSheet()">
        <span>＋</span> เพิ่มสินทรัพย์
    </button>
</div>

<div class="overlay" id="add-overlay" onclick="closeAddSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
        <h3>เพิ่มสินทรัพย์ใหม่</h3>
        <input type="text" id="new-asset-name" placeholder="ชื่อ เช่น VOO, ACWI" autocomplete="off" inputmode="text">
        <div class="sheet-actions">
            <button class="btn-cancel" type="button" onclick="closeAddSheet()">ยกเลิก</button>
            <button class="btn-confirm" type="button" onclick="addAsset()">เพิ่ม</button>
        </div>
    </div>
</div>

<script>
const defaultAssets = [
    { name: 'QQQI', value: 3000, target: 33 },
    { name: 'JEPQ', value: 1120, target: 12 },
    { name: 'SMH',  value: 3500, target: 38 },
    { name: 'IBIT', value: 1500, target: 17 }
];

let myPortfolio = JSON.parse(localStorage.getItem('myPortfolio')) || defaultAssets;

function fmt(n, dec = 2) {
    return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function getAction(diff) {
    if (diff > 0.01) return { cls: 'buy', text: `ซื้อ<br>$${fmt(diff, 0)}` };
    if (diff < -0.01) return { cls: 'sell', text: `ขาย<br>$${fmt(Math.abs(diff), 0)}` };
    return { cls: 'hold', text: 'สมดุล' };
}

function computePortfolio() {
    let totalValue = 0, totalTarget = 0;
    myPortfolio.forEach(a => {
        totalValue += a.value;
        totalTarget += a.target;
    });

    const assets = myPortfolio.map((asset, index) => {
        const curPct = totalValue > 0 ? (asset.value / totalValue) * 100 : 0;
        const ideal = totalValue * (asset.target / 100);
        const diff = ideal - asset.value;
        return { index, asset, curPct, ideal, diff, action: getAction(diff) };
    });

    return { totalValue, totalTarget, assets };
}

function updateSummary(totalValue, totalTarget, assets) {
    document.getElementById('total-value').textContent = fmt(totalValue, 0);

    const targetBox = document.getElementById('target-box');
    const targetEl = document.getElementById('target-status');
    targetBox.className = 'summary-item' + (totalTarget === 100 ? ' ok' : ' warn');
    targetEl.textContent = totalTarget + '%' + (totalTarget !== 100 ? ' ⚠' : ' ✓');

    const summaryEl = document.getElementById('rebalance-summary');
    const textEl = document.getElementById('rebalance-text');
    const buys = [], sells = [];
    let totalBuy = 0, totalSell = 0;

    assets.forEach(({ asset, diff }) => {
        if (diff > 0.01) { buys.push(`${asset.name} $${fmt(diff, 0)}`); totalBuy += diff; }
        else if (diff < -0.01) { sells.push(`${asset.name} $${fmt(Math.abs(diff), 0)}`); totalSell += Math.abs(diff); }
    });

    if (buys.length || sells.length) {
        let html = '';
        if (buys.length) html += `<div class="buy-line">🟢 ซื้อเพิ่ม: ${buys.join(', ')} (รวม $${fmt(totalBuy, 0)})</div>`;
        if (sells.length) html += `<div class="sell-line">🔴 ขายออก: ${sells.join(', ')} (รวม $${fmt(totalSell, 0)})</div>`;
        textEl.innerHTML = html;
        summaryEl.classList.remove('hidden');
    } else if (assets.length) {
        textEl.innerHTML = '<div class="hold-line">✓ พอร์ตสมดุลแล้ว — ไม่ต้องซื้อขาย</div>';
        summaryEl.classList.remove('hidden');
    } else {
        summaryEl.classList.add('hidden');
    }
}

function recalculate() {
    const { totalValue, totalTarget, assets } = computePortfolio();
    updateSummary(totalValue, totalTarget, assets);

    assets.forEach(({ index, curPct, ideal, action }) => {
        const card = document.querySelector(`.asset-card[data-index="${index}"]`);
        if (!card) return;
        card.querySelector('.asset-pct').textContent = curPct.toFixed(1) + '%';
        card.querySelector('.asset-ideal').textContent = '$' + fmt(ideal, 0);
        const actionEl = card.querySelector('.asset-action');
        actionEl.className = 'asset-action ' + action.cls;
        actionEl.innerHTML = action.text;
    });

    localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
}

function renderAndCalculate() {
    const list = document.getElementById('assets-list');
    list.innerHTML = '';

    const { totalValue, totalTarget, assets } = computePortfolio();
    updateSummary(totalValue, totalTarget, assets);

    if (myPortfolio.length === 0) {
        list.innerHTML = '<div class="empty-state">ยังไม่มีสินทรัพย์<br>กดปุ่มด้านล่างเพื่อเพิ่ม</div>';
        localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
        return;
    }

    assets.forEach(({ index, asset, curPct, ideal, action }) => {
        const row = document.createElement('div');
        row.className = 'asset-card';
        row.dataset.index = index;
        row.innerHTML = `
            <div class="asset-header">
                <span class="drag-handle" aria-label="สลับลำดับ ${asset.name}">≡</span>
                <div class="asset-badge">${asset.name.slice(0, 4)}</div>
                <div class="asset-name">${asset.name}</div>
                <div class="asset-action ${action.cls}">${action.text}</div>
                <button class="btn-delete" type="button" aria-label="ลบ ${asset.name}" onclick="deleteAsset(${index})">×</button>
            </div>
            <div class="asset-grid">
                <div class="cell">
                    <span class="cell-label">มูลค่าจริง</span>
                    <input class="cell-input" type="number" inputmode="decimal"
                        value="${asset.value || ''}" placeholder="0"
                        oninput="updateAsset(${index}, 'value', this.value)">
                </div>
                <div class="cell">
                    <span class="cell-label">สัดส่วนจริง</span>
                    <span class="cell-value asset-pct">${curPct.toFixed(1)}%</span>
                </div>
                <div class="cell">
                    <span class="cell-label">มูลค่าเป้าหมาย</span>
                    <span class="cell-value asset-ideal">$${fmt(ideal, 0)}</span>
                </div>
                <div class="cell">
                    <span class="cell-label">สัดส่วนเป้าหมาย</span>
                    <input class="cell-input" type="number" inputmode="decimal"
                        value="${asset.target || ''}" placeholder="0"
                        oninput="updateAsset(${index}, 'target', this.value)">
                </div>
            </div>`;
        list.appendChild(row);
    });

    localStorage.setItem('myPortfolio', JSON.stringify(myPortfolio));
}

function updateAsset(index, field, val) {
    myPortfolio[index][field] = parseFloat(val) || 0;
    recalculate();
}

function deleteAsset(index) {
    if (confirm(`ลบ ${myPortfolio[index].name} ออกจากพอร์ต?`)) {
        myPortfolio.splice(index, 1);
        renderAndCalculate();
    }
}

function openAddSheet() {
    document.getElementById('add-overlay').classList.add('open');
    document.getElementById('new-asset-name').value = '';
    setTimeout(() => document.getElementById('new-asset-name').focus(), 100);
}

function closeAddSheet(e) {
    if (e && e.target !== document.getElementById('add-overlay')) return;
    document.getElementById('add-overlay').classList.remove('open');
}

function addAsset() {
    const name = document.getElementById('new-asset-name').value.trim().toUpperCase();
    if (!name) return;
    myPortfolio.push({ name, value: 0, target: 0 });
    closeAddSheet();
    renderAndCalculate();
}

document.getElementById('new-asset-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addAsset();
});

/* Drag to reorder (long-press on ≡ handle) */
let drag = null;

function getPoint(e) {
    return e.touches ? e.touches[0] : e;
}

function activateDrag(point) {
    if (!drag || drag.active) return;
    const { card, list } = drag;
    const rect = card.getBoundingClientRect();

    drag.active = true;
    drag.placeholder = document.createElement('div');
    drag.placeholder.className = 'drag-placeholder';
    drag.placeholder.style.height = rect.height + 'px';
    list.insertBefore(drag.placeholder, card);

    card.classList.add('drag-float');
    card.style.width = rect.width + 'px';
    card.style.left = rect.left + 'px';
    card.style.top = (point.clientY - drag.offsetY) + 'px';

    list.classList.add('drag-active');
    if (navigator.vibrate) navigator.vibrate(20);
}

function movePlaceholder(clientY) {
    const cards = [...drag.list.querySelectorAll('.asset-card')];
    for (const card of cards) {
        if (card === drag.card) continue;
        const rect = card.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
            drag.list.insertBefore(drag.placeholder, card);
            return;
        }
    }
    drag.list.appendChild(drag.placeholder);
}

function finishDrag() {
    if (!drag.active) return;
    const { card, list, placeholder } = drag;
    list.insertBefore(card, placeholder);
    placeholder.remove();

    card.classList.remove('drag-float');
    card.removeAttribute('style');
    list.classList.remove('drag-active');

    const cards = [...list.querySelectorAll('.asset-card')];
    myPortfolio = cards.map(c => myPortfolio[parseInt(c.dataset.index)]);
    renderAndCalculate();
}

function onDragStart(e) {
    if (drag) return;
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;

    const card = handle.closest('.asset-card');
    if (!card) return;

    const point = getPoint(e);
    drag = {
        card,
        list: card.parentElement,
        startX: point.clientX,
        startY: point.clientY,
        offsetY: point.clientY - card.getBoundingClientRect().top,
        timer: setTimeout(() => activateDrag(point), 400),
        active: false
    };
}

function onDragMove(e) {
    if (!drag) return;
    const point = getPoint(e);

    if (!drag.active) {
        if (Math.abs(point.clientY - drag.startY) > 8 || Math.abs(point.clientX - drag.startX) > 8) {
            clearTimeout(drag.timer);
            drag = null;
        }
        return;
    }

    e.preventDefault();
    drag.card.style.top = (point.clientY - drag.offsetY) + 'px';
    movePlaceholder(point.clientY);
}

function onDragEnd() {
    if (!drag) return;
    clearTimeout(drag.timer);
    if (drag.active) finishDrag();
    drag = null;
}

(function initDragSort() {
    const list = document.getElementById('assets-list');
    list.addEventListener('touchstart', onDragStart, { passive: true });
    list.addEventListener('mousedown', onDragStart);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('touchend', onDragEnd);
    document.addEventListener('touchcancel', onDragEnd);
    document.addEventListener('mouseup', onDragEnd);
    list.addEventListener('contextmenu', e => {
        if (e.target.closest('.drag-handle')) e.preventDefault();
    });
})();

/* PWA */
let deferredPrompt;
const btnInstall = document.getElementById('btn-install');

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    btnInstall.classList.add('visible');
});

btnInstall.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btnInstall.classList.remove('visible');
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

renderAndCalculate();
</script>
</body>
</html>
